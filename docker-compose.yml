version: "3.9"

networks:
  crypto-net:
    driver: bridge

volumes:
  kafka-data:

services:
  # ── Apache Kafka (KRaft mode, no Zookeeper) ───────────────────────────────
  kafka:
    image: bitnami/kafka:3.7
    container_name: crypto-kafka
    networks:
      - crypto-net
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      - KAFKA_CFG_NODE_ID=1
      - KAFKA_CFG_PROCESS_ROLES=broker,controller
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=1@kafka:9093
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=true
      - KAFKA_CFG_LOG_RETENTION_HOURS=1
      - KAFKA_CFG_LOG_SEGMENT_BYTES=104857600
      - ALLOW_PLAINTEXT_LISTENER=yes
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ── Kafka UI ───────────────────────────────────────────────────────────────
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: crypto-kafka-ui
    networks:
      - crypto-net
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  # ── Ingester Service ──────────────────────────────────────────────────────
  ingester:
    build:
      context: ./ingester
      dockerfile: Dockerfile
    container_name: crypto-ingester
    networks:
      - crypto-net
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_TRADES=${KAFKA_TOPIC_TRADES:-crypto-trades}
      - BINANCE_WS_URL=${BINANCE_WS_URL:-wss://stream.binance.com:9443/stream}
      - COINBASE_WS_URL=${COINBASE_WS_URL:-wss://advanced-trade-ws.coinbase.com}
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── Processor Service ─────────────────────────────────────────────────────
  processor:
    build:
      context: ./processor
      dockerfile: Dockerfile
    container_name: crypto-processor
    networks:
      - crypto-net
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_TRADES=${KAFKA_TOPIC_TRADES:-crypto-trades}
      - KAFKA_TOPIC_METRICS=${KAFKA_TOPIC_METRICS:-crypto-metrics}
      - KAFKA_GROUP_ID_PROCESSOR=${KAFKA_GROUP_ID_PROCESSOR:-processor-group}
      - SMA_WINDOW=${SMA_WINDOW:-20}
      - ANOMALY_ZSCORE_THRESHOLD=${ANOMALY_ZSCORE_THRESHOLD:-2.5}
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── API Server ────────────────────────────────────────────────────────────
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: crypto-api
    networks:
      - crypto-net
    ports:
      - "3001:3001"
    environment:
      - KAFKA_BROKERS=kafka:9092
      - KAFKA_TOPIC_METRICS=${KAFKA_TOPIC_METRICS:-crypto-metrics}
      - KAFKA_GROUP_ID_API=${KAFKA_GROUP_ID_API:-api-group}
      - API_PORT=${API_PORT:-3001}
    depends_on:
      kafka:
        condition: service_healthy
    restart: on-failure

  # ── Dashboard (React 18 + TypeScript + Vite, served by Node.js/Express) ──
  dashboard:
    build:
      context: ./dashboard-react
      dockerfile: Dockerfile
    container_name: crypto-dashboard
    networks:
      - crypto-net
    ports:
      - "${DASHBOARD_PORT:-8080}:8080"
    environment:
      - VITE_API_URL=http://localhost:3001
    depends_on:
      - api
